apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure      # Waits for MetalLB CRDs to exist first
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/metallb-config
  prune: true
  wait: true
  timeout: 5m0s
