# infrastructure/metallb/ipaddresspool.yaml
# ─────────────────────────────────────────────────────────────
# AUTO-GENERATED by scripts/03-bootstrap-flux.sh
# The IP range below is replaced at bootstrap time with the
# correct value from .env (METALLB_IP_RANGE).
#
# For kubeadm:  set to your server's public IP  e.g. 203.0.113.10/32
# For kind:     set to a range from the Docker bridge subnet
# ─────────────────────────────────────────────────────────────
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.240-192.168.1.250   # Replaced by bootstrap.sh
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2advert
  namespace: metallb-system
spec:
  ipAddressPools:
    - default-pool
