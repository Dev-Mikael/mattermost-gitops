apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h0m0s
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 10m0s
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.10.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
  values:
    controller:
      # Request a LoadBalancer — MetalLB will assign the IP
      service:
        type: LoadBalancer
        # Ensure real client IPs are passed to apps
        externalTrafficPolicy: Local

      # Allow large file uploads (Mattermost file sharing)
      config:
        proxy-body-size: "100m"
        proxy-read-timeout: "600"
        proxy-send-timeout: "600"
        # Required for Mattermost WebSocket (real-time messaging)
        proxy-http-version: "1.1"
        upstream-hash-by: "$http_x_forwarded_for"

      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi

      # For kind: override with hostNetwork + NodePort if MetalLB is unavailable
      # hostNetwork: false  (uncomment and set true only for kind without MetalLB)

      admissionWebhooks:
        enabled: true

    defaultBackend:
      enabled: true
      resources:
        limits:
          cpu: 20m
          memory: 32Mi
