apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
spec:
  interval: 1h0m0s
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost-db
  namespace: mattermost
spec:
  interval: 10m0s
  chart:
    spec:
      chart: postgresql
      version: ">=15.0.0 <16.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
  # Pull the postgres password from the sealed secret
  valuesFrom:
    - kind: Secret
      name: mattermost-db-postgresql
      valuesKey: postgres-password
      targetPath: global.postgresql.auth.postgresPassword
    - kind: Secret
      name: mattermost-db-postgresql
      valuesKey: password
      targetPath: global.postgresql.auth.password
  values:
    global:
      postgresql:
        auth:
          username: mmuser
          database: mattermost
          # password: injected via valuesFrom above
    primary:
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ""          # Uses cluster default StorageClass
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi
    readReplicas:
      replicaCount: 0             # Set to 1+ for HA
