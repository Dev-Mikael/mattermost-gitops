apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost-db
  namespace: mattermost
spec:
  interval: 10m0s
  chart:
    spec:
      chart: postgresql
      version: ">=15.0.0 <16.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
  values:
    image:
      registry: docker.io
      repository: postgres
      tag: "15-alpine"
      pullPolicy: IfNotPresent
    global:
      postgresql:
        auth:
          username: mmuser
          password: "mattermost_db_password"
          database: mattermost
    primary:
      persistence:
        enabled: true
        size: 10Gi
    readReplicas:
      replicaCount: 0
