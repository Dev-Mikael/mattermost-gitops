apiVersion: v1
kind: Service
metadata:
  name: mattermost-db-postgresql
  namespace: mattermost
spec:
  selector:
    app: mattermost-postgresql
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mattermost-db-postgresql
  namespace: mattermost
spec:
  serviceName: mattermost-db-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: mattermost-postgresql
  template:
    metadata:
      labels:
        app: mattermost-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: mmuser
            - name: POSTGRES_DB
              value: mattermost
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mattermost-db-postgresql
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, mmuser, -d, mattermost]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
